# Default training configuration

training:
  # Basic settings
  epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-5

  # Optimizer
  optimizer_type: adamw
  betas: [0.9, 0.999]

  # Scheduler
  scheduler_type: cosine_warmup
  warmup_epochs: 10
  min_lr: 1e-6

  # Gradient
  gradient_clip_val: 5.0
  accumulate_grad_batches: 1

  # Mixed precision
  use_amp: true

  # Logging
  log_every_n_steps: 100
  val_check_interval: 1

  # Checkpointing
  save_top_k: 3
  save_every_n_epochs: 10
  monitor: val_loss
  monitor_mode: min          # "min" for loss, "max" for SI-SDRi

  # Early stopping
  early_stopping_patience: 20  # Set to 0 to disable

  # Loss
  loss_type: si_snr           # "si_snr" | "composite"
  si_snr_weight: 1.0
  l1_weight: 0.0
  stft_weight: 0.0
